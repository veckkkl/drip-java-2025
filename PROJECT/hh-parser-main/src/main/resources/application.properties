# Database Configuration
spring.datasource.url=jdbc:postgresql://db:5432/vacancies
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Liquibase Configuration
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# Server Configuration
server.port=5000

# Thymeleaf Configuration
spring.thymeleaf.cache=false

# HH.ru API Configuration
hh.api.base-url=https://api.hh.ru
hh.api.user-agent=Mozilla/5.0

# Vacancy Sources Configuration
vacancy.sources[0].name=HH.ru
vacancy.sources[0].base-url=https://api.hh.ru
vacancy.sources[0].search-path=/vacancies
vacancy.sources[0].enabled=true
vacancy.sources[0].headers.user-agent=Mozilla/5.0
vacancy.sources[0].headers.accept=application/json

vacancy.sources[1].name=SuperJob.ru
vacancy.sources[1].base-url=https://www.superjob.ru
vacancy.sources[1].search-path=/vakansii
vacancy.sources[1].enabled=false
vacancy.sources[1].headers.user-agent=Mozilla/5.0 